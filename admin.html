<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Schedule Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{

background:#111;

color:white;

font-family:Arial;

}

.card{

margin:auto;

margin-top:40px;

width:900px;

max-width:95%;

background:#222;

padding:30px;

border-radius:15px;

}

.drop{

border:3px dashed #666;

padding:60px;

text-align:center;

border-radius:15px;

cursor:pointer;

transition:.3s;

}

.drop:hover{

background:#333;

}

img{

max-width:100%;

margin-top:20px;

display:none;

border-radius:10px;

}

pre{

background:#000;

padding:20px;

height:250px;

overflow:auto;

margin-top:20px;

}

.progress{

margin-top:20px;

display:none;

}

</style>

</head>

<body>

<div class="card">

<h2>Upload Schedule</h2>

<p>Choose the newest schedule image.</p>

<div class="drop" id="drop">

Click Here or Drag Image

<input

type="file"

id="file"

accept="image/*"

hidden>

</div>

<img id="preview">

<div class="progress">

<div

class="progress-bar"

id="bar"

style="width:0%">

0%

</div>

</div>

<pre id="output">

Waiting...

</pre>

<button

class="btn btn-success mt-3"

onclick="processImage()">

Read Schedule

</button>

</div>

<script>

const SUPABASE_URL="https://gkcsgvpzlfiqmcgbhskq.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrY3NndnB6bGZpcW1jZ2Joc2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MzQ1NjEsImV4cCI6MjA5OTMxMDU2MX0.JgKJTwdR1PaFq41_5icsu2JnzZfwOxDd1yabuwxBC8o";

const client=supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const file=document.getElementById("file");
const drop=document.getElementById("drop");
const preview=document.getElementById("preview");
const output=document.getElementById("output");
const progress=document.querySelector(".progress");
const bar=document.getElementById("bar");

drop.onclick=()=>file.click();

file.onchange=()=>{

const f=file.files[0];

if(!f)return;

preview.src=URL.createObjectURL(f);
preview.style.display="block";

};

async function processImage(){

const f=file.files[0];

if(!f){
alert("Please choose a schedule image.");
return;
}

output.textContent="Uploading image...";

progress.style.display="block";

bar.style.width="10%";
bar.innerHTML="10%";

const {error}=await client.storage
.from("schedules")
.upload(
"currentSchedule.png",
f,
{
upsert:true
}
);

if(error){

alert(error.message);

return;

}

bar.style.width="30%";
bar.innerHTML="30%";

output.textContent="Reading schedule with OCR...";

const result=await Tesseract.recognize(

f,

"eng",

{

logger:m=>{

if(m.status==="recognizing text"){

const percent=Math.round(m.progress*60)+30;

bar.style.width=percent+"%";

bar.innerHTML=percent+"%";

}

}

}

);

bar.style.width="100%";
bar.innerHTML="100%";

output.textContent=result.data.text;

await parseSchedule(result.data.text);

}

async function parseSchedule(text){

output.textContent+="\n\n-------------\n";
output.textContent+="Searching for employee rows...\n";

const lines=text.split("\n");

for(const line of lines){

const clean=line.trim();

if(clean.length<3)continue;

console.log(clean);

}

output.textContent+="Done.";

}

</script>

</body>

</html>
