<!DOCTYPE html>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div id="imageViewer">
    <img id="viewerImage">
</div>
<style>

body{
    margin:0;
    background:#121212;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

#locked{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#locked i{
    font-size:120px;
    color:#ffc107;
    margin-bottom:25px;
}

#locked h1{
    font-size:48px;
    margin-bottom:10px;
}

#locked p{
    color:#bdbdbd;
    margin-bottom:30px;
    font-size:20px;
}

#content{
    display:none;
    padding:50px;
}

.card{
    background:#1e1e1e;
    border:none;
    color:white;
    .zoomable{
    cursor:pointer;
    transition:.3s;
}

.zoomable:hover{
    transform:scale(1.03);
}

#imageViewer{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

#imageViewer img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
    animation:zoom .25s ease;
}

@keyframes zoom{
    from{
        transform:scale(.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}
}

</style>

</head>
<script>
const viewer = document.getElementById("imageViewer");
const viewerImage = document.getElementById("viewerImage");

document.querySelectorAll(".zoomable").forEach(img => {

    img.addEventListener("click", function(){

        viewer.style.display="flex";
        viewerImage.src=this.src;

    });

});

viewer.addEventListener("click", function(e){

    if(e.target===viewer){
        viewer.style.display="none";
    }

});

document.addEventListener("keydown", function(e){

    if(e.key==="Escape"){
        viewer.style.display="none";
    }

});
<script>

</div>

</div>
