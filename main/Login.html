<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Jays Site</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body{
    background:#141414 url("images/background1.png") center center/cover no-repeat;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Poppins,sans-serif;
}

.login-box{
    width:400px;
    max-width:95%;
    background:rgba(0,0,0,.8);
    padding:35px;
    border-radius:15px;
    color:white;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.logo{
    display:block;
    margin:auto;
    width:120px;
    margin-bottom:20px;
}

.btn-primary{
    width:100%;
}

#error{
    color:#ff6b6b;
    text-align:center;
    margin-top:15px;
}

a{
    color:#4ea3ff;
    text-decoration:none;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="login-box">

<img src="images/logo.png" class="logo">

<h3 class="text-center mb-4">Welcome Back</h3>

<div class="mb-3">
<label>Email</label>
<input
id="email"
class="form-control"
type="email"
placeholder="Enter your email">
</div>

<div class="mb-4">
<label>Password</label>
<input
id="password"
class="form-control"
type="password"
placeholder="Enter your password">
</div>

<button onclick="login()" class="btn btn-primary">
Login
</button>

<div id="error"></div>

</div>

<script>

const SUPABASE_URL = "https://gkcsgvpzlfiqmcgbhskq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdrY3NndnB6bGZpcW1jZ2Joc2txIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MzQ1NjEsImV4cCI6MjA5OTMxMDU2MX0.JgKJTwdR1PaFq41_5icsu2JnzZfwOxDd1yabuwxBC8o";

const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY
);

async function login(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

document.getElementById("error").innerHTML="";

const {error}=await client.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("error").innerHTML=error.message;
return;
}

window.location="index.html";

}

// Already logged in?
(async()=>{

const {data:{session}}=await client.auth.getSession();

if(session){
window.location="index.html";
}

})();

</script>

</body>
</html>
